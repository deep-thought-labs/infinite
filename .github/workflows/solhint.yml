name: Solhint
# Solidity style: runs when .sol or this workflow changes (see CI_CD.md).

on:
  pull_request:

permissions: read-all

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      sol: ${{ steps.filter.outputs.sol }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            sol:
              - '**/*.sol'
              - '.github/workflows/solhint.yml'

  solhint:
    name: runner / solhint
    needs: changes
    if: needs.changes.outputs.sol == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - run: npm install -g solhint@v5.0.5
      - run: solhint --version
      - run: solhint '**/*.sol'
