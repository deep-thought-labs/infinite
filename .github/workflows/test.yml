name: Tests
on:
  merge_group:
  pull_request:
  push:
    branches:
      - main
      - release/**
permissions: read-all

jobs:
  cleanup-runs:
    runs-on: ubuntu-latest
    steps:
      - uses: rokroskar/workflow-run-cleanup-action@master
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
    if: "!startsWith(github.ref, 'refs/tags/') && github.ref != 'refs/heads/main'"

  # Job-level skip: docs-only PRs (e.g. CHANGELOG.md, docs/**) do not schedule heavy jobs.
  # See docs/guides/infrastructure/CI_CD.md — Path filtering (docs-only changes).
  changes:
    runs-on: ubuntu-latest
    outputs:
      tests_go: ${{ steps.filter.outputs.tests_go }}
      tests_scripts: ${{ steps.filter.outputs.tests_scripts }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            tests_go:
              - '**/*.go'
              - '**/*.sol'
              - 'go.mod'
              - 'go.sum'
              - 'go.work'
              - 'go.work.sum'
              - 'infinited/go.mod'
              - 'infinited/go.sum'
              - '*.toml'
              - 'Makefile'
              - 'proto/**'
              - 'tests/**'
              - '.github/workflows/test.yml'
            tests_scripts:
              - '.github/workflows/test.yml'
              - 'scripts/**'

  # Four coverage blocks (fork): isolates failures/timeouts (e.g. infinited integration vs evm core).
  # See docs/guides/development/TESTING.md — Granular coverage blocks.
  test-unit-cover:
    needs: changes
    if: needs.changes.outputs.tests_go == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - make_target: test-unit-cover-evm-core
            coverage_file: coverage_evm_core.txt
            codecov_flags: evm-core
          - make_target: test-unit-cover-evm-integration
            coverage_file: coverage_evm_integration.txt
            codecov_flags: evm-integration
          - make_target: test-unit-cover-infinited-core
            coverage_file: coverage_infinited_core.txt
            codecov_flags: infinited-core
          - make_target: test-unit-cover-infinited-integration
            coverage_file: coverage_infinited_integration.txt
            codecov_flags: infinited-integration
    steps:
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          check-latest: true
      - uses: actions/checkout@v4
      - name: Test coverage block (${{ matrix.make_target }})
        run: make ${{ matrix.make_target }}
      - uses: codecov/codecov-action@v5
        with:
          file: ./${{ matrix.coverage_file }}
          flags: ${{ matrix.codecov_flags }}
          # We were getting a 500 error on codecov servers
          # so we decided to avoid blocking the CI if this fails
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  test-scripts:
    needs: changes
    if: needs.changes.outputs.tests_scripts == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Pytest
        run: |
          python -m pip install --upgrade pip
          pip install pytest
      - name: Test Scripts
        run: |
          make test-scripts
