name: Build

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - "infinited/**"
      - "go.mod"
      - "go.sum"
      - "infinited/go.mod"
      - "infinited/go.sum"
      - ".github/workflows/build.yml"
  push:
    branches:
      - main
      - feat/krakatoa

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Push to main has no path filter; skip heavy matrix when only non-build paths changed (CI_CD.md).
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - 'infinited/**'
              - 'go.mod'
              - 'go.sum'
              - 'infinited/go.mod'
              - 'infinited/go.sum'
              - '.github/workflows/build.yml'

  build:
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.code == 'true'
    timeout-minutes: 15
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        goarch: [amd64, arm64]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Required for git describe to match iid-v* release tags

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          check-latest: true
          cache: true
          cache-dependency-path: |
            go.sum
            infinited/go.sum

      - name: Install CGO cross-compilers
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu gcc-x86-64-linux-gnu

      - name: Get version info
        id: version
        shell: bash
        run: |
          VERSION=$(git describe --tags --always --match 'iid-v*' | sed 's/^v//')
          COMMIT=$(git log -1 --format='%H')
          COMMIT_SHORT=$(git log -1 --format='%h')
          TMVERSION=$(go list -m github.com/cometbft/cometbft | sed 's:.* ::')
          BRANCH_NAME=$(echo "${{ github.ref_name }}" | sed 's|/|-|g')

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "commit=${COMMIT}" >> "$GITHUB_OUTPUT"
          echo "commit_short=${COMMIT_SHORT}" >> "$GITHUB_OUTPUT"
          echo "tmversion=${TMVERSION}" >> "$GITHUB_OUTPUT"
          echo "branch=${BRANCH_NAME}" >> "$GITHUB_OUTPUT"

      - name: Build infinited
        working-directory: infinited
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "1"
        shell: bash
        run: |
          BINARY_NAME="infinited-${{ steps.version.outputs.branch }}-${{ steps.version.outputs.commit_short }}-linux-${{ matrix.goarch }}"

          # Ensure a matching C compiler is available for CGO cross builds.
          case "${{ matrix.goarch }}" in
            arm64) export CC="aarch64-linux-gnu-gcc" ;;
            amd64) export CC="x86_64-linux-gnu-gcc" ;;
            *) echo "Unsupported GOARCH: ${{ matrix.goarch }}"; exit 1 ;;
          esac

          go build \
            -trimpath \
            -tags "netgo" \
            -ldflags "-w -s \
              -X github.com/cosmos/cosmos-sdk/version.Name=infinite \
              -X github.com/cosmos/cosmos-sdk/version.AppName=infinited \
              -X github.com/cosmos/cosmos-sdk/version.Version=${{ steps.version.outputs.version }} \
              -X github.com/cosmos/cosmos-sdk/version.Commit=${{ steps.version.outputs.commit }} \
              -X github.com/cometbft/cometbft/version.TMCoreSemVer=${{ steps.version.outputs.tmversion }} \
              -X github.com/cosmos/cosmos-sdk/version.BuildTags=netgo" \
            -o "${BINARY_NAME}" \
            ./cmd/infinited

      - name: Generate checksum
        working-directory: infinited
        shell: bash
        run: |
          BINARY_NAME="infinited-${{ steps.version.outputs.branch }}-${{ steps.version.outputs.commit_short }}-linux-${{ matrix.goarch }}"
          sha256sum "${BINARY_NAME}" > "${BINARY_NAME}.sha256"

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: infinited-${{ steps.version.outputs.branch }}-${{ steps.version.outputs.commit_short }}-linux-${{ matrix.goarch }}
          path: |
            infinited/infinited-${{ steps.version.outputs.branch }}-${{ steps.version.outputs.commit_short }}-linux-${{ matrix.goarch }}
            infinited/infinited-${{ steps.version.outputs.branch }}-${{ steps.version.outputs.commit_short }}-linux-${{ matrix.goarch }}.sha256
          retention-days: 30
          if-no-files-found: error
