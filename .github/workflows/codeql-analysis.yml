# For most projects, this workflow file will not need changing; you simply need
# to commit it to your repository.
#
# You may wish to alter this workflow file to override the set of languages analyzed,
# or to provide custom queries or build logic.
#
# ******** NOTE ********
# We have attempted to detect the languages in your repository. Please check
# the `language` matrix defined below to confirm you have the correct set of
# supported CodeQL languages.
#
# Job-level skip when only docs change: see docs/guides/infrastructure/CI_CD.md
#
name: "CodeQL"

on:
  pull_request:
permissions: read-all

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      codeql_workflow: ${{ steps.filter.outputs.codeql_workflow }}
      scan_go: ${{ steps.filter.outputs.scan_go }}
      scan_javascript: ${{ steps.filter.outputs.scan_javascript }}
      scan_python: ${{ steps.filter.outputs.scan_python }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            codeql_workflow:
              - '.github/workflows/codeql-analysis.yml'
            scan_go:
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'
              - 'go.work'
              - 'go.work.sum'
              - 'infinited/go.mod'
              - 'infinited/go.sum'
              - '*.toml'
            scan_javascript:
              - '**/*.js'
              - '**/*.ts'
              - '**/*.tsx'
              - '**/*.mjs'
              - '**/*.cjs'
            scan_python:
              - '**/*.py'

  analyze:
    name: Analyze
    needs: changes
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: ['go', 'javascript', 'python']
    if: |
      needs.changes.outputs.codeql_workflow == 'true' ||
      (needs.changes.outputs.scan_go == 'true' && matrix.language == 'go') ||
      (needs.changes.outputs.scan_javascript == 'true' && matrix.language == 'javascript') ||
      (needs.changes.outputs.scan_python == 'true' && matrix.language == 'python')
        # CodeQL supports [ 'cpp', 'csharp', 'go', 'java', 'javascript', 'python' ]
        # Learn more:
        # https://docs.github.com/en/free-pro-team@latest/github/finding-security-vulnerabilities-and-errors-in-your-code/configuring-code-scanning#changing-the-languages-that-are-analyzed

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Initializes the CodeQL tools for scanning.
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: crypto-com/cosmos-sdk-codeql@main,security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
